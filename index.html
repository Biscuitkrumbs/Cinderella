<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Cinderella Planner</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Cinderella</p>
      <h1>Stay Planner</h1>
      <p id="summaryText" class="summary">Loading...</p>
    </div>
    <button id="addStayBtn" class="fab" aria-label="Add stay">+</button>
  </header>

  <main>
    <section class="card today-card">
      <div>
        <p class="label">Today</p>
        <h2 id="todayTitle">0 cleans</h2>
        <p id="nextClean" class="muted">All clear</p>
      </div>
      <div class="progress-pill"><span id="progressText">0 / 0</span></div>
    </section>

    <section class="card planner-card">
      <div class="planner-head">
        <div>
          <h2>4 week view</h2>
          <p class="muted">Swipe sideways. Tap a stay to edit.</p>
        </div>
        <button id="jumpTodayBtn" class="soft-btn">Today</button>
      </div>
      <div id="timeline" class="timeline" aria-label="Stay timeline"></div>
      <div class="legend">
        <span><i class="dot today"></i>Checkout today</span>
        <span><i class="dot future"></i>Upcoming</span>
        <span><i class="dot past"></i>Past</span>
        <span><i class="dot issue"></i>Issue</span>
      </div>
    </section>

    <section class="card list-card">
      <div class="planner-head">
        <h2>Today's cleans</h2>
        <span id="cleanCount" class="badge">0</span>
      </div>
      <div id="todayList" class="today-list"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="active">Planner</button>
    <button id="feedbackBtn">Feedback</button>
  </nav>

  <dialog id="stayDialog">
    <form id="stayForm" method="dialog">
      <div class="dialog-title">
        <h2 id="stayDialogTitle">Add Stay</h2>
        <button type="button" id="closeStayBtn" class="xbtn">×</button>
      </div>
      <input id="editIndex" type="hidden" />
      <label>Property nickname<input id="propertyInput" required placeholder="Ocean View" /></label>
      <label>Guest names<input id="guestInput" required placeholder="Emma & Nick" /></label>
      <div class="two-col">
        <label>Check in<input id="checkInInput" type="date" required /></label>
        <label>Check out<input id="checkOutInput" type="date" required /></label>
      </div>
      <label>Status
        <select id="statusInput">
          <option value="pending">Pending</option>
          <option value="done">Clean done</option>
          <option value="issue">Issue</option>
        </select>
      </label>
      <div class="dialog-actions between">
        <button type="button" id="deleteStayBtn" class="danger hidden">Delete</button>
        <div>
          <button type="button" id="issueFromStayBtn" class="soft-btn hidden">Report issue</button>
          <button type="submit" class="primary">Save</button>
        </div>
      </div>
    </form>
  </dialog>

  <dialog id="issueDialog">
    <form id="issueForm" method="dialog">
      <div class="dialog-title">
        <h2>Report Issue</h2>
        <button type="button" id="closeIssueBtn" class="xbtn">×</button>
      </div>
      <input id="issueIndex" type="hidden" />
      <label>Issue type
        <select id="issueTypeInput" required>
          <option value="">Choose one</option>
          <option>Missing supplies</option>
          <option>Damage</option>
          <option>Access / key problem</option>
          <option>Extra messy</option>
          <option>Linen / laundry</option>
          <option>Other</option>
        </select>
      </label>
      <label>Notes<textarea id="issueNotesInput" rows="4" placeholder="What happened?"></textarea></label>
      <div class="dialog-actions">
        <button type="submit" class="primary">Save issue</button>
      </div>
    </form>
  </dialog>

  <dialog id="feedbackDialog">
    <form id="feedbackForm" method="dialog">
      <div class="dialog-title">
        <h2>What annoyed you?</h2>
        <button type="button" id="closeFeedbackBtn" class="xbtn">×</button>
      </div>
      <textarea id="feedbackInput" rows="5" placeholder="Cindy's weekly feedback..."></textarea>
      <div class="dialog-actions"><button type="submit" class="primary">Send</button></div>
    </form>
  </dialog>

  <div id="toast" class="toast hidden"></div>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
