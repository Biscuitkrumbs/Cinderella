<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cinderella Timeline</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Cinderella</div>
    <div class="title">
      <button id="backBtn" class="icon-btn">‹</button>
      <h1 id="monthTitle">Timeline</h1>
      <button id="forwardBtn" class="icon-btn">›</button>
    </div>
    <button id="todayBtn" class="pill-btn">Today</button>
  </header>

  <main class="app-shell">
    <aside class="property-column" id="propertyColumn"></aside>
    <section class="timeline-wrap" id="timelineWrap">
      <div class="timeline" id="timeline"></div>
    </section>
  </main>

  <footer class="legend">
    <span><i class="mini-cell"></i> 1 night</span>
    <span><i class="clean-dot"></i> checkout / clean</span>
    <span class="hint">Swipe left or right to scroll timeline</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
