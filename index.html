<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cinderella MVP</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header>
    <h1>Cinderella MVP</h1>
    <p>Simple working version first. Pretty later.</p>
  </header>

  <main>
    <section>
      <h2>Properties</h2>
      <button id="newPropertyBtn">Add Property</button>
      <div id="propertiesList"></div>
    </section>

    <section>
      <h2>Stays</h2>
      <button id="newStayBtn">Add Stay</button>
      <div id="staysList"></div>
    </section>

    <section>
      <h2>Cleans</h2>
      <div id="cleansList"></div>
    </section>

    <section>
      <h2>Basic Timeline</h2>
      <div id="timeline"></div>
    </section>
  </main>

  <dialog id="propertyDialog">
    <form id="propertyForm">
      <h2 id="propertyFormTitle">Add Property</h2>
      <input type="hidden" id="propertyId" />

      <label>Property name
        <input id="propertyName" required />
      </label>

      <label>Colour
        <input id="propertyColour" type="color" value="#8b5cf6" />
      </label>

      <label>Address
        <input id="propertyAddress" />
      </label>

      <label>Owner name
        <input id="ownerName" />
      </label>

      <label>Owner email
        <input id="ownerEmail" type="email" />
      </label>

      <label>Owner phone
        <input id="ownerPhone" />
      </label>

      <label>Access notes
        <textarea id="accessNotes"></textarea>
      </label>

      <label>Key notes
        <textarea id="keyNotes"></textarea>
      </label>

      <div class="bed-grid">
        <label>King beds
          <input id="kingBeds" type="number" min="0" value="0" />
        </label>

        <label>Queen beds
          <input id="queenBeds" type="number" min="0" value="0" />
        </label>

        <label>Single beds
          <input id="singleBeds" type="number" min="0" value="0" />
        </label>
      </div>

      <label>Cleaning notes
        <textarea id="cleaningNotes"></textarea>
      </label>

      <div class="actions">
        <button type="button" id="cancelPropertyBtn">Cancel</button>
        <button type="submit">Save Property</button>
      </div>
    </form>
  </dialog>

  <dialog id="stayDialog">
    <form id="stayForm">
      <h2 id="stayFormTitle">Add Stay</h2>
      <input type="hidden" id="stayId" />

      <label>Property
        <select id="stayPropertyId" required></select>
      </label>

      <label>Guest name
        <input id="guestName" required />
      </label>

      <label>Arrival date
        <input id="arrivalDate" type="date" required />
      </label>

      <label>Departure date
        <input id="departureDate" type="date" required />
      </label>

      <label>Stay notes
        <textarea id="stayNotes"></textarea>
      </label>

      <div class="actions">
        <button type="button" id="cancelStayBtn">Cancel</button>
        <button type="submit">Save Stay</button>
      </div>
    </form>
  </dialog>

  <dialog id="cleanDialog">
    <form id="cleanForm">
      <h2>Complete Clean</h2>
      <input type="hidden" id="cleanStayId" />

      <p id="cleanSummary"></p>

      <div class="bed-grid">
        <label>King beds changed
          <input id="cleanKingBeds" type="number" min="0" value="0" />
        </label>

        <label>Queen beds changed
          <input id="cleanQueenBeds" type="number" min="0" value="0" />
        </label>

        <label>Single beds changed
          <input id="cleanSingleBeds" type="number" min="0" value="0" />
        </label>
      </div>

      <label>Extras
        <textarea id="cleanExtras"></textarea>
      </label>

      <label>Invoice notes
        <textarea id="invoiceNotes"></textarea>
      </label>

      <div class="actions">
        <button type="button" id="cancelCleanBtn">Cancel</button>
        <button type="submit">Save & Complete</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
